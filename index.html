<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protecao Contra Golpes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Protecao Contra Golpes</h1>
        <p>Ajudando idosos a reconhecer tentativas de golpe</p>
    </header>

    <!-- Barra de acessibilidade -->
    <section class="barra-acessibilidade">
        <button id="botao-contraste">Alto Contraste</button>
        <button id="botao-aumentar">Aumentar Letra</button>
        <button id="botao-diminuir">Diminuir Letra</button>
    </section>

    <!-- Verificador de mensagens -->
    <main class="conteudo-principal">

        <section class="caixa-verificacao">
            <h2>Verificar Mensagem</h2>

            <label for="texto-mensagem">
                Cole aqui a mensagem recebida:
            </label>

            <textarea
                id="texto-mensagem"
                rows="8"
                placeholder="Digite ou cole a mensagem recebida">
            </textarea>

            <button id="botao-analisar">
                Analisar Mensagem
            </button>

            <div id="resultado"></div>
        </section>

        <!-- Dicas -->
        <section class="caixa-dicas">
            <h2>Dicas de Seguranca</h2>

            <ul>
                <li>Nunca informe senhas.</li>
                <li>Desconfie de premios inesperados.</li>
                <li>Nao clique em links desconhecidos.</li>
                <li>Confirme informacoes com familiares.</li>
                <li>Bancos nao pedem senha por mensagem.</li>
            </ul>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
